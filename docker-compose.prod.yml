services:
  backend:
    build:
      context: ./BACKEND/Gestion_Ma_Ec
      dockerfile: Dockerfile
    container_name: gestion-notes-backend
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "8001:8000"
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001/api}
    container_name: gestion-notes-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env.production
    ports:
      - "3001:3000"
    networks:
      - app-net

networks:
  app-net:
    external: true
    name: traefik-public
