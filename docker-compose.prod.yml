services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001/api}
    container_name: gestion-notes-frontend1
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.gestion-notes.rule=Host(`${APP_DOMAIN_PRIMARY:-gestion.lahlou.tech}`) || Host(`${APP_DOMAIN_SECONDARY:-gestion.lahlou.dpdns.org}`)
      - traefik.http.routers.gestion-notes.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.gestion-notes.tls=true
      - traefik.http.routers.gestion-notes.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-myresolver}
      - traefik.http.routers.gestion-notes.priority=1
      - traefik.http.services.gestion-notes.loadbalancer.server.port=3001

  backend:
    build:
      context: ./BACKEND/Gestion_Ma_Ec
      dockerfile: Dockerfile
    container_name: gestion-notes-backend1
    env_file:
      - .env.production
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.gestion-notes-backend.rule=(Host(`${APP_DOMAIN_PRIMARY:-gestion.lahlou.tech}`) || Host(`${APP_DOMAIN_SECONDARY:-gestion.lahlou.dpdns.org}`)) && (PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/media`))
      - traefik.http.routers.gestion-notes-backend.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.gestion-notes-backend.tls=true
      - traefik.http.routers.gestion-notes-backend.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-myresolver}
      - traefik.http.routers.gestion-notes-backend.priority=100
      - traefik.http.services.gestion-notes-backend.loadbalancer.server.port=8001

networks:
  traefik-public:
    external: true
