name: Deploy Gestion de notes to Oracle VM

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production-intermediate-mommy/gestion-de-notes
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            APP_DIR=/home/ubuntu/gestion-de-notes
            REPO_URL=https://github.com/${{ github.repository }}.git

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            if ! docker network inspect traefik-public >/dev/null 2>&1; then
              docker network create traefik-public
            fi

            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build --remove-orphans
